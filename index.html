<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Slip Gaji - PT BANGKET COF MEDIA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            body { background: white; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .no-print { display: none; }
            .print-area { 
                box-shadow: none !important; 
                margin: 0 !important; 
                border: none !important;
                width: 100% !important;
                max-width: 100% !important;
            }
        }
        
        .slip-font { font-family: 'Courier New', Courier, monospace; }
        
        /* Container Tanda Tangan & Stempel */
        .signature-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100px;
            width: 100%;
        }

        /* Tanda Tangan Asrul - Dibuat Besar & Natural Menimpa Nama */
        .asrul-signature {
            position: absolute;
            bottom: -20px; /* Posisi menimpa garis nama */
            max-width: 220px; /* Ukuran diperbesar */
            height: auto;
            transform: rotate(-2deg); /* Miring dikit biar natural */
            opacity: 0.95;
            filter: contrast(1.3) brightness(0.9); /* Efek pulpen pulen */
            pointer-events: none;
            z-index: 5;
        }

        /* Tanda Tangan HRD */
        .hrd-signature-image {
            position: absolute;
            max-width: 150px;
            height: auto;
            opacity: 0.9;
            pointer-events: none;
            z-index: 1;
        }

        /* Stempel Perusahaan - Efek Tinta Basah */
        .stamp-image {
            position: absolute;
            top: -10px;
            left: 55%;
            transform: translateX(-50%) rotate(-12deg); /* Miring khas stempel manual */
            max-width: 140px;
            height: auto;
            opacity: 0.8;
            pointer-events: none;
            mix-blend-mode: multiply; /* Biar tinta stempel nyampur sama TTD */
            z-index: 10; /* Di atas TTD HRD */
        }

        .line-name {
            border-top: 1px solid #444;
            display: inline-block;
            padding: 2px 20px 0 20px;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body class="bg-gray-100 py-10">

    <div class="max-w-4xl mx-auto mb-6 no-print flex justify-between items-center px-4">
        <h1 class="text-xl font-bold text-gray-700 font-sans">Generator Slip Gaji v1.0</h1>
        <button onclick="window.print()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded shadow-lg transition flex items-center gap-2 font-sans font-bold">
            CETAK / SIMPAN PDF
        </button>
    </div>

    <div id="app" class="max-w-[21cm] mx-auto bg-white p-10 shadow-2xl border border-gray-200 print-area slip-font text-[#1a1a1a]">
        
        <div class="flex justify-between border-b-4 border-black pb-4">
            <div>
                <h2 class="text-2xl font-black tracking-tighter" id="comp-name"></h2>
                <p class="text-xs uppercase font-bold" id="comp-fields"></p>
                <p class="text-xs italic" id="comp-address"></p>
            </div>
            <div class="text-right flex flex-col justify-center">
                <div class="bg-black text-white px-4 py-1.5 font-bold text-sm mb-1 uppercase tracking-wider">Slip Gaji Resmi</div>
                <p class="text-[11px] text-gray-600 font-sans" id="slip-ref"></p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-6 my-8 text-sm border border-gray-300 p-4 bg-gray-50">
            <div class="flex flex-col gap-1.5">
                <div class="flex"><span class="w-36 font-semibold">Nama Karyawan</span>: <span id="emp-name" class="ml-2 font-bold text-base"></span></div>
                <div class="flex"><span class="w-36 font-semibold">Jabatan</span>: <span id="emp-pos" class="ml-2 uppercase"></span></div>
            </div>
            <div class="flex flex-col gap-1.5">
                <div class="flex"><span class="w-36 font-semibold">Periode Gaji</span>: <span id="slip-period" class="ml-2 font-bold"></span></div>
                <div class="flex"><span class="w-36 font-semibold">Status</span>: <span id="emp-status" class="ml-2">Tetap</span></div>
            </div>
        </div>

        <div class="border border-black">
            <div class="grid grid-cols-2 bg-gray-100 font-bold border-b border-black text-center text-sm tracking-wide">
                <div class="border-r border-black py-2.5">PENGHASILAN (EARNINGS)</div>
                <div class="py-2.5">POTONGAN (DEDUCTIONS)</div>
            </div>
            
            <div class="grid grid-cols-2 min-h-[180px]">
                <div class="border-r border-black p-5 text-sm space-y-2.5" id="list-earnings"></div>
                <div class="p-5 text-sm space-y-2.5" id="list-deductions"></div>
            </div>

            <div class="grid grid-cols-2 border-t border-black font-bold text-sm">
                <div class="border-r border-black p-3 flex justify-between bg-gray-100">
                    <span>TOTAL BRUTO</span>
                    <span id="total-earnings"></span>
                </div>
                <div class="p-3 flex justify-between bg-gray-100 text-red-700">
                    <span>TOTAL POTONGAN</span>
                    <span id="total-deductions"></span>
                </div>
            </div>
        </div>

        <div class="mt-8 bg-[#1a1a1a] text-white p-5 flex justify-between items-center rounded-sm">
            <div>
                <p class="text-xs uppercase tracking-wider text-gray-300">Gaji Bersih (Take Home Pay)</p>
                <p class="text-[11px] italic text-gray-400 mt-1 font-sans" id="terbilang"></p>
            </div>
            <div class="text-3xl font-extrabold tracking-tight" id="thp-amount"></div>
        </div>

        <div class="mt-16 grid grid-cols-3 text-center text-[11px] font-sans">
            <div class="flex flex-col items-center">
                <p class="mb-2 font-semibold">Diterima Oleh,</p>
                <div class="signature-container">
                    <img src="https://raw.githubusercontent.com/10ribuadm/gjslip/refs/heads/main/ttd%20asrul.png" class="asrul-signature" alt="TTD Asrul">
                </div>
                <p class="line-name" id="sign-name"></p>
                <p class="text-[10px]">Karyawan</p>
            </div>
            
            <div></div>
            
            <div class="flex flex-col items-center">
                <p class="mb-1 font-semibold" id="print-date"></p>
                <p class="mb-2 font-semibold uppercase" id="comp-label"></p>
                <div class="signature-container">
                    <img src="https://raw.githubusercontent.com/10ribuadm/gjslip/refs/heads/main/TTD%20HRD.png" class="hrd-signature-image" alt="TTD HRD">
                    <img src="https://raw.githubusercontent.com/10ribuadm/gjslip/refs/heads/main/stempel%20pt%20bangket.png" class="stamp-image" alt="Stempel">
                </div>
                <p class="line-name" id="hrd-name"></p>
                <p class="text-[10px]">HRD & Finance Manager</p>
            </div>
        </div>

        <div class="mt-16 border-t border-gray-100 pt-2 text-center no-print font-sans">
            <p class="text-[10px] text-gray-400 uppercase tracking-widest">Dokumen Elektronik PT BANGKET COF MEDIA</p>
        </div>
    </div>

    <script>
        const data = {
            "perusahaan": {
                "nama": "PT BANGKET COF MEDIA",
                "bidang": "Application Dev • Advertising • Networking • Starlink Installation",
                "alamat": "Jerowaru, Lombok Timur, NTB, Indonesia"
            },
            "slip_detail": {
                "nomor_referensi": "BCM/SLP/2026/02/103",
                "periode": "Februari 2026",
                "tanggal_cetak": "28 Februari 2026"
            },
            "karyawan": {
                "nama": "Asrul Sarkawi, S.Kom",
                "jabatan": "Senior Network Engineer",
                "status": "Pegawai Tetap"
            },
            "hrd": { "nama": "Mutiara Tsani, S.Tat" },
            "penghasilan": {
                "Gaji Pokok": 8500000,
                "Tunjangan Jabatan": 1500000,
                "Tunjangan Transport": 1000000,
                "Bonus Proyek": 500000
            },
            "potongan": {
                "BPJS Kesehatan (1%)": 110000,
                "BPJS Ketenagakerjaan (2%)": 150000,
                "PPh 21": 125000
            }
        };

        function formatRupiah(num) { return "Rp " + num.toLocaleString('id-ID'); }

        document.getElementById('comp-name').innerText = data.perusahaan.nama;
        document.getElementById('comp-fields').innerText = data.perusahaan.bidang;
        document.getElementById('comp-address').innerText = data.perusahaan.alamat;
        document.getElementById('comp-label').innerText = data.perusahaan.nama;
        document.getElementById('hrd-name').innerText = data.hrd.nama;
        document.getElementById('slip-ref').innerText = "Ref: " + data.slip_detail.nomor_referensi;
        document.getElementById('slip-period').innerText = data.slip_detail.periode;
        document.getElementById('print-date').innerText = "Jerowaru, " + data.slip_detail.tanggal_cetak;
        document.getElementById('emp-name').innerText = data.karyawan.nama;
        document.getElementById('sign-name').innerText = data.karyawan.nama;
        document.getElementById('emp-pos').innerText = data.karyawan.jabatan;
        document.getElementById('emp-status').innerText = data.karyawan.status;

        let totalE = 0;
        let earnHtml = "";
        for (let item in data.penghasilan) {
            totalE += data.penghasilan[item];
            earnHtml += `<div class="flex justify-between"><span>${item}</span><span class="font-semibold">${formatRupiah(data.penghasilan[item])}</span></div>`;
        }
        document.getElementById('list-earnings').innerHTML = earnHtml;
        document.getElementById('total-earnings').innerText = formatRupiah(totalE);

        let totalD = 0;
        let deductHtml = "";
        for (let item in data.potongan) {
            totalD += data.potongan[item];
            deductHtml += `<div class="flex justify-between"><span>${item}</span><span class="font-semibold text-red-700">${formatRupiah(data.potongan[item])}</span></div>`;
        }
        document.getElementById('list-deductions').innerHTML = deductHtml;
        document.getElementById('total-deductions').innerText = formatRupiah(totalD);

        const thp = totalE - totalD;
        document.getElementById('thp-amount').innerText = formatRupiah(thp);
        document.getElementById('terbilang').innerText = "# Sebelas Juta Seratus Lima Belas Ribu Rupiah #";
    </script>
</body>
</html>
